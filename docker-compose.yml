version: '3.9'

services:
  # Database Service
  db:
    image: postgres:15-alpine
    container_name: crud_db
    environment:
      POSTGRES_DB: ${DB_NAME:-cruddb}
      POSTGRES_USER: ${DB_USER:-cruduser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-crudpassword123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cruduser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: crud_backend
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-django-insecure-change-this-in-production}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-cruddb}
      DB_USER: ${DB_USER:-cruduser}
      DB_PASSWORD: ${DB_PASSWORD:-crudpassword123}
      DB_HOST: db
      DB_PORT: 5432
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server/myproject:/app
      - static_volume:/app/staticfiles
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 4 --timeout 120 myproject.wsgi:application"

  # Frontend Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: crud_frontend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "4200:4200"
    depends_on:
      - backend
    volumes:
      - ./src:/app/src

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: crud_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - static_volume:/app/staticfiles:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  static_volume:

networks:
  default:
    name: crud_network
