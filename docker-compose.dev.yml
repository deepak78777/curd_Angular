version: '3.9'

services:
  # Backend Service with SQLite
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: crud_backend_dev
    environment:
      DEBUG: ${DEBUG:-True}
      SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-key}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      DB_ENGINE: django.db.backends.sqlite3
      DB_NAME: db.sqlite3
    ports:
      - "8000:8000"
    volumes:
      - ./server/myproject:/app
      - static_volume:/app/staticfiles
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"

  # Frontend Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: crud_frontend_dev
    environment:
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "4200:4200"
    depends_on:
      - backend
    volumes:
      - ./src:/app/src

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: crud_nginx_dev
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
    depends_on:
      - backend
      - frontend
    command: /bin/sh -c "rm -f /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  static_volume:

networks:
  default:
    name: crud_network_dev
